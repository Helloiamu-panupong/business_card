<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panupong Ditbangklo — The Roots Routes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --yellow:#FEBF00;        /* brand color from logo */
    --yellow-dark:#E5AC00;
    --blue:#0F5557;          /* deep teal - เข้ากับเหลืองทอง */
    --blue-dark:#0A3F40;
    --cream:#F4F1E4;
    --ink:#2B2B2B;
    --muted:#5C5C5C;
    --line:#E8E4D2;
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html,body{
    min-height:100%;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(254,191,0,0.20), transparent 60%),
      radial-gradient(900px 500px at 110% 110%, rgba(15,85,87,0.12), transparent 60%),
      #faf7ec;
    font-family:'Montserrat', sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }

  .page{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }

  .card{
    width:100%;
    max-width:520px;
    background:#fff;
    border-radius:24px;
    overflow:hidden;
    box-shadow:
      0 30px 60px -20px rgba(15,85,87,0.25),
      0 18px 30px -15px rgba(254,191,0,0.30),
      0 0 0 1px rgba(0,0,0,0.04);
    position:relative;
    animation:rise .8s cubic-bezier(.2,.8,.2,1) both;
  }

  @keyframes rise{
    from{opacity:0; transform:translateY(24px) scale(.98)}
    to{opacity:1; transform:translateY(0) scale(1)}
  }

  /* ==== TOP: Yellow band with logo ==== */
  .top{
    background:var(--yellow);
    padding:44px 32px 50px;
    position:relative;
    overflow:hidden;
  }
  .top::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:8px;
    background:#1f1f1f;
  }

  .logo-full{
    display:block;
    margin:0 auto;
    max-width:280px;
    width:80%;
    height:auto;
    filter:brightness(0) invert(1); /* turn the yellow logo to white */
  }

  /* ==== MIDDLE ==== */
  .middle{
    padding:40px 32px 28px;
    position:relative;
    background:#fff;
  }

  .big-circle{
    position:absolute;
    right:-90px;
    top:30px;
    width:240px;
    height:240px;
    border-radius:50%;
    background:var(--yellow);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 12px 30px -10px rgba(254,191,0,0.55);
    overflow:hidden;
  }
  .big-circle img{
    width:140px;
    height:auto;
    transform:translateX(-30px);
    filter:brightness(0) invert(1); /* white */
  }

  .name-tag{
    display:inline-block;
    background:var(--blue);
    color:#fff;
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:24px;
    letter-spacing:0.3px;
    padding:8px 18px 10px;
    border-radius:6px;
    transform:rotate(-2deg);
    box-shadow:0 8px 18px -8px rgba(15,85,87,0.55);
    position:relative;
    z-index:2;
    animation:tagIn .9s .2s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes tagIn{
    from{opacity:0; transform:rotate(-6deg) translateY(8px)}
    to{opacity:1; transform:rotate(-2deg) translateY(0)}
  }

  .info{
    margin-top:20px;
    position:relative;
    z-index:2;
  }
  .info .role{
    font-size:18px;
    font-weight:500;
    color:var(--ink);
    margin-bottom:8px;
  }
  .info .line{
    font-size:16px;
    color:var(--ink);
    margin-bottom:4px;
    font-weight:400;
  }
  .info a{
    color:var(--ink);
    text-decoration:none;
    transition:color .2s;
  }
  .info a:hover{color:var(--blue)}

  .qr-section{
    margin-top:24px;
    padding:18px;
    background:linear-gradient(135deg, #fff 0%, #fffaf0 100%);
    border:1px dashed var(--line);
    border-radius:14px;
    display:flex;
    align-items:center;
    gap:16px;
    position:relative;
    z-index:2;
    max-width:320px;
  }
  #qrcode{
    width:96px;height:96px;
    flex-shrink:0;
    padding:6px;
    background:#fff;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  #qrcode img, #qrcode canvas{display:block;width:100%;height:100%}
  .qr-label{
    font-size:12px;
    color:var(--muted);
    line-height:1.4;
  }
  .qr-label strong{
    display:block;
    color:var(--blue);
    font-weight:700;
    font-size:13px;
    margin-bottom:2px;
  }

  .bottom{
    background:var(--cream);
    padding:24px 32px 28px;
    position:relative;
  }
  .bottom::before{
    content:"";
    position:absolute;
    top:-1px;left:0;right:0;
    height:24px;
    background:#fff;
    clip-path:polygon(0 0, 100% 0, 100% 60%, 0 100%);
  }

  .contact-row{
    display:flex;
    align-items:flex-start;
    gap:12px;
    margin-bottom:10px;
    font-size:14px;
    color:var(--ink);
  }
  .contact-row:last-child{margin-bottom:0}
  .icon{
    width:30px;height:30px;
    border-radius:50%;
    background:var(--yellow);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    color:#fff;
    box-shadow:0 4px 10px -4px rgba(254,191,0,0.7);
  }
  .icon svg{width:16px;height:16px}
  .contact-row a{
    color:var(--ink);
    text-decoration:none;
    line-height:30px;
    transition:color .2s;
  }
  .contact-row a:hover{color:var(--blue)}
  .contact-row span{line-height:1.5; padding-top:5px}

  .actions{
    display:flex;
    gap:10px;
    margin-top:18px;
    flex-wrap:wrap;
  }
  .btn{
    flex:1;
    min-width:140px;
    padding:12px 16px;
    border:none;
    border-radius:10px;
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.3px;
    cursor:pointer;
    transition:transform .15s, box-shadow .2s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-decoration:none;
  }
  .btn-primary{
    background:var(--blue);
    color:#fff;
    box-shadow:0 8px 20px -8px rgba(15,85,87,0.6);
  }
  .btn-primary:hover{
    background:var(--blue-dark);
    transform:translateY(-2px);
    box-shadow:0 12px 24px -8px rgba(15,85,87,0.7);
  }
  .btn-secondary{
    background:#fff;
    color:var(--ink);
    border:1.5px solid var(--line);
  }
  .btn-secondary:hover{
    border-color:var(--yellow);
    color:var(--yellow-dark);
    transform:translateY(-2px);
  }
  .btn svg{width:14px;height:14px}

  @media (max-width: 480px){
    .card{border-radius:20px}
    .top{padding:32px 24px 40px}
    .logo-full{max-width:220px}
    .middle{padding:32px 24px 24px}
    .name-tag{font-size:20px;padding:7px 14px 8px}
    .big-circle{width:180px;height:180px;right:-70px;top:24px}
    .big-circle img{width:100px}
    .info .role{font-size:16px}
    .info .line{font-size:14px}
    .bottom{padding:20px 24px 24px}
    .contact-row{font-size:13px}
    .qr-section{flex-direction:column;text-align:center;max-width:100%}
  }
</style>
</head>

    "ORG:The Roots Routes",

    "ADR;TYPE=WORK:;;16, 18 Sukha 1 Alley, Wat Ratchabophit;Phra Nakhon;Bangkok;10200;Thailand",
    "END:VCARD"
  ].join("\n");

  new QRCode(document.getElementById("qrcode"), {
    text: vcard,
    width: 96,
    height: 96,
    colorDark : "#0F5557",
    colorLight : "#ffffff",
    correctLevel : QRCode.CorrectLevel.M
  });

  document.getElementById("saveBtn").addEventListener("click", function(){
    const blob = new Blob([vcard], {type:"text/vcard;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "Panupong_Ditbangklo.vcf";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
